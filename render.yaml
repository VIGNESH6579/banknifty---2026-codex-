services:
  - type: web
    name: banknifty-signal-backend
    runtime: java
    plan: starter
    rootDir: backend
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/banknifty-signal-backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /health
    envVars:
      - key: JAVA_VERSION
        value: 21
      - key: DB_URL
        fromDatabase:
          name: banknifty-signal-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: banknifty-signal-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: banknifty-signal-db
          property: password
      - key: ANGEL_CLIENT_ID
        sync: false
      - key: ANGEL_API_KEY
        sync: false
      - key: ANGEL_PASSWORD
        sync: false
      - key: ANGEL_TOTP_SECRET
        sync: false
      - key: NTFY_TOPIC
        sync: false

  - type: web
    name: banknifty-signal-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: banknifty-signal-db
    plan: free
