server:
  port: ${PORT:8080}

spring:
  main:
    lazy-initialization: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  market:
    symbol: BANKNIFTY
    trading-symbol: BANKNIFTY
    token: 26009
    candle-capacity: 50
    reconnect-delay: 5s
    duplicate-signal-cooldown: 10m
    price-scale: 100.0
  notification:
    ntfy-topic: ${NTFY_TOPIC:}

logging:
  level:
    root: INFO
    com.banknifty.signal: DEBUG
